<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── DATA ─────────────────────────────────────────────────────────────────────

const FAMILY = ['Mum', 'Dad', 'Grandma', 'Grandpa', 'Auntie', 'Uncle'];

const DRI = {
  iron:     { label: 'Iron',      unit: 'mg',  goal: 11,   color: '#C8624A', icon: '🩸' },
  calcium:  { label: 'Calcium',   unit: 'mg',  goal: 260,  color: '#6B8F71', icon: '🦴' },
  protein:  { label: 'Protein',   unit: 'g',   goal: 11,   color: '#D4933A', icon: '💪' },
  zinc:     { label: 'Zinc',      unit: 'mg',  goal: 3,    color: '#8B6B8E', icon: '⚡' },
  vitaminD: { label: 'Vitamin D', unit: 'mcg', goal: 10,   color: '#C8A04A', icon: '☀️' },
  vitaminC: { label: 'Vitamin C', unit: 'mg',  goal: 50,   color: '#6B8F71', icon: '🍊' },
  omega3:   { label: 'Omega-3',   unit: 'g',   goal: 0.5,  color: '#5B7FA8', icon: '🐟' },

// Nutrients per serving
const FOODS = {
  // Fruits & Veg

  'Butternut Sq.':{ emoji: '🎃', cat: 'Fruit & Veg', iron: 0.3, calcium: 18, protein: 0.8, zinc: 0.1, vitaminC: 15, vitaminD: 0, omega3: 0 },

  'Apple':        { emoji: '🍎', cat: 'Fruit & Veg', iron: 0.1, calcium: 4,  protein: 0.2, zinc: 0.05,vitaminC: 3,  vitaminD: 0, omega3: 0 },
  'Pear':         { emoji: '🍐', cat: 'Fruit & Veg', iron: 0.1, calcium: 5,  protein: 0.2, zinc: 0.05,vitaminC: 3,  vitaminD: 0, omega3: 0 },
  'Avocado':      { emoji: '🥑', cat: 'Fruit & Veg', iron: 0.2, calcium: 4,  protein: 0.9, zinc: 0.2, vitaminC: 5,  vitaminD: 0, omega3: 0.1 },
  'Mango':        { emoji: '🥭', cat: 'Fruit & Veg', iron: 0.1, calcium: 7,  protein: 0.4, zinc: 0.05,vitaminC: 28, vitaminD: 0, omega3: 0 },
  // Proteins

  'Lentils':      { emoji: '🫘', cat: 'Protein',    iron: 1.5, calcium: 10, protein: 4.5, zinc: 0.7, vitaminC: 1,  vitaminD: 0, omega3: 0 },
  'Egg Yolk':     { emoji: '🥚', cat: 'Protein',    iron: 0.6, calcium: 22, protein: 2.7, zinc: 0.4, vitaminC: 0,  vitaminD: 0.9,omega3: 0.1},
  'Tofu':         { emoji: '⬜', cat: 'Protein',    iron: 0.6, calcium: 100,protein: 4.0, zinc: 0.3, vitaminC: 0,  vitaminD: 0, omega3: 0 },
  'Salmon':       { emoji: '🐟', cat: 'Protein',    iron: 0.3, calcium: 10, protein: 7.0, zinc: 0.3, vitaminC: 0,  vitaminD: 7.0,omega3: 1.2},
  'Beef Puree':   { emoji: '🥩', cat: 'Protein',    iron: 1.8, calcium: 4,  protein: 7.0, zinc: 1.5, vitaminC: 0,  vitaminD: 0, omega3: 0 },
  // Grains & Dairy
  'Rice Cereal':  { emoji: '🌾', cat: 'Grains',     iron: 3.0, calcium: 130,protein: 1.5, zinc: 1.0, vitaminC: 0,  vitaminD: 0, omega3: 0 },
  'Oatmeal':      { emoji: '🥣', cat: 'Grains',     iron: 1.5, calcium: 15, protein: 3.0, zinc: 0.5, vitaminC: 0,  vitaminD: 0, omega3: 0 },
  'Full-fat Yogurt':{ emoji:'🥛', cat: 'Dairy',     iron: 0.1, calcium: 110,protein: 4.0, zinc: 0.4, vitaminC: 0,  vitaminD: 0.5,omega3: 0 },
  'Cheese':       { emoji: '🧀', cat: 'Dairy',      iron: 0.1, calcium: 200,protein: 4.0, zinc: 0.7, vitaminC: 0,  vitaminD: 0.1,omega3: 0 },
};

const FORMULA_PER_FEED = { iron:1.2, calcium:68, protein:2.0, zinc:0.5, vitaminC:12, vitaminD:1.2, omega3:0.06 };

const MEALS = ['Breakfast', 'Lunch', 'Dinner', 'Snack'];
const MEAL_ICONS = { Breakfast:'🌅', Lunch:'☀️', Dinner:'🌙', Snack:'🍪' };

const MILESTONES = [
  { food: 'Rice Cereal', emoji: '🌾' },
  { food: 'Sweet Potato', emoji: '🍠' },
  { food: 'Carrot', emoji: '🥕' },
  { food: 'Peas', emoji: '🟢' },
  { food: 'Banana', emoji: '🍌' },
  { food: 'Apple', emoji: '🍎' },
  { food: 'Avocado', emoji: '🥑' },
  { food: 'Chicken', emoji: '🍗' },
  { food: 'Lentils', emoji: '🫘' },
  { food: 'Egg Yolk', emoji: '🥚' },
  { food: 'Salmon', emoji: '🐟' },
  { food: 'Tofu', emoji: '⬜' },
  { food: 'Full-fat Yogurt', emoji: '🥛' },
  { food: 'Broccoli', emoji: '🥦' },
  { food: 'Mango', emoji: '🥭' },
  { food: 'Spinach', emoji: '🌿' },
  { food: 'Oatmeal', emoji: '🥣' },
  { food: 'Beef Puree', emoji: '🥩' },
];

const DAYS_LABELS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

// Initial sample data
function makeInitialState() {
  const today = new Date();
  const fmt = d => d.toISOString().slice(0,10);
  const yest = new Date(today); yest.setDate(yest.getDate()-1);
  const d2   = new Date(today); d2.setDate(d2.getDate()-2);
  const d3   = new Date(today); d3.setDate(d3.getDate()-3);

  return {
    screen: 'home',
    logModal: null,
    familyModal: false,
    selectedFamily: 'Mum',
    entries: {
      [fmt(d3)]: {
        formulaFeeds: 4,
        meals: {
          Breakfast: [{ food:'Rice Cereal', by:'Mum' }, { food:'Banana', by:'Mum' }],
          Lunch:     [{ food:'Sweet Potato', by:'Dad' }, { food:'Carrot', by:'Dad' }],
          Dinner:    [{ food:'Chicken', by:'Mum' }, { food:'Peas', by:'Mum' }],
          Snack:     [{ food:'Apple', by:'Grandma' }],
        }
      },
      [fmt(d2)]: {
        formulaFeeds: 5,
        meals: {
          Breakfast: [{ food:'Oatmeal', by:'Dad' }, { food:'Pear', by:'Dad' }],
          Lunch:     [{ food:'Lentils', by:'Mum' }, { food:'Carrot', by:'Mum' }],
          Dinner:    [{ food:'Broccoli', by:'Dad' }, { food:'Sweet Potato', by:'Dad' }],
          Snack:     [],
        }
      },
      [fmt(yest)]: {
        formulaFeeds: 4,
        meals: {
          Breakfast: [{ food:'Rice Cereal', by:'Mum' }],
          Lunch:     [{ food:'Egg Yolk', by:'Grandma' }, { food:'Avocado', by:'Grandma' }],
          Dinner:    [{ food:'Salmon', by:'Dad' }, { food:'Peas', by:'Dad' }],
          Snack:     [{ food:'Banana', by:'Mum' }],
        }
      },
      [fmt(today)]: {
        formulaFeeds: 2,
        meals: {
          Breakfast: [{ food:'Oatmeal', by:'Mum' }, { food:'Apple', by:'Mum' }],
          Lunch:     [{ food:'Tofu', by:'Dad' }, { food:'Broccoli', by:'Dad' }],
          Dinner:    [],
          Snack:     [],
        }
      },
    },
    milestonesUnlocked: ['Rice Cereal','Sweet Potato','Carrot','Peas','Banana','Apple','Avocado','Chicken','Lentils','Egg Yolk','Salmon','Oatmeal','Tofu','Broccoli'],
    tweaks: {"primaryColor":"#C8624A","bgColor":"#FDF8F1","fontScale":1,"babyName":"Amaia","babyAge":"9 months"},
  };
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────

function calcNutrients(dayData) {
  const totals = { iron:0, calcium:0, protein:0, zinc:0, vitaminD:0, vitaminC:0, omega3:0 };
  if (!dayData) return totals;
  const ff = dayData.formulaFeeds || 0;
  Object.keys(totals).forEach(k => totals[k] += (FORMULA_PER_FEED[k]||0) * ff);
  Object.values(dayData.meals || {}).forEach(items =>
    (items||[]).forEach(({ food }) => {
      const f = FOODS[food];
      if (f) Object.keys(totals).forEach(k => totals[k] += (f[k]||0));
    })
  );
  return totals;
}

function todayKey() { return new Date().toISOString().slice(0,10); }

function getMealCount(dayData) {
  if (!dayData) return 0;
  return Object.values(dayData.meals||{}).reduce((a,m)=>a+(m||[]).length,0);
}

function pct(val, goal) { return Math.min(100, Math.round((val/goal)*100)); }

function round1(n) { return Math.round(n*10)/10; }

// ─── COMPONENTS ───────────────────────────────────────────────────────────────

function BottomNav({ screen, setScreen, tweaks }) {
  const tabs = [
    { id:'home',       icon:HomeIcon,       label:'Today' },
    { id:'nutrients',  icon:NutrientIcon,   label:'Nutrients' },
    { id:'week',       icon:CalIcon,        label:'Week' },
    { id:'milestones', icon:StarIcon,       label:'Milestones' },
  ];
  const primary = tweaks.primaryColor || '#C8624A';
  const bg = tweaks.bgColor || '#FDF8F1';
  return (
    <nav style={{
      position:'fixed', bottom:0, left:0, right:0,
      background: bg,
      borderTop:'1.5px solid #EDE4D8',
      display:'flex', justifyContent:'space-around',
      padding:'8px 0 max(8px, env(safe-area-inset-bottom))',
      zIndex:100, boxShadow:'0 -4px 20px rgba(80,50,30,0.06)',
    }}>
      {tabs.map(t => {
        const active = screen === t.id;
        const TC = t.icon;
        return (
          <button key={t.id} onClick={()=>setScreen(t.id)} style={{
            background:'none', border:'none', cursor:'pointer',
            display:'flex', flexDirection:'column', alignItems:'center', gap:3,
            padding:'4px 16px', borderRadius:12,
          }}>
            <TC active={active} primary={primary} />
            <span style={{
              fontSize:11, fontWeight: active?700:500,
              color: active ? primary : '#A89080',
              fontFamily:'Nunito',
            }}>{t.label}</span>
          </button>
        );
      })}
    </nav>
  );
}

function HomeIcon({ active, primary }) {
  const c = active ? primary : '#C4B0A0';
  return <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
    <path d="M3 12L12 3l9 9" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    <path d="M9 21V12h6v9" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    <path d="M5 10v11h14V10" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
}
function NutrientIcon({ active, primary }) {
  const c = active ? primary : '#C4B0A0';
  return <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
    <rect x="3" y="14" width="4" height="7" rx="1" fill={c} opacity={active?1:0.5}/>
    <rect x="10" y="9" width="4" height="12" rx="1" fill={c} opacity={active?1:0.7}/>
    <rect x="17" y="4" width="4" height="17" rx="1" fill={c}/>
  </svg>;
}
function CalIcon({ active, primary }) {
  const c = active ? primary : '#C4B0A0';
  return <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
    <rect x="3" y="4" width="18" height="18" rx="3" stroke={c} strokeWidth="2"/>
    <path d="M3 9h18" stroke={c} strokeWidth="2"/>
    <path d="M8 2v4M16 2v4" stroke={c} strokeWidth="2" strokeLinecap="round"/>
    <circle cx="8" cy="14" r="1.5" fill={c}/><circle cx="12" cy="14" r="1.5" fill={c}/><circle cx="16" cy="14" r="1.5" fill={c}/>
  </svg>;
}
function StarIcon({ active, primary }) {
  const c = active ? primary : '#C4B0A0';
  return <svg width="24" height="24" viewBox="0 0 24 24" fill={active?c:'none'} stroke={c} strokeWidth="2">
    <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
  </svg>;
}

// ─── HOME SCREEN ──────────────────────────────────────────────────────────────

function HomeScreen({ state, dispatch }) {
  const tkey = todayKey();
  const today = state.entries[tkey] || { formulaFeeds:0, meals:{Breakfast:[],Lunch:[],Dinner:[],Snack:[]} };
  const nutrients = calcNutrients(today);
  const totalFoods = getMealCount(today);
  const overallPct = Math.round(Object.keys(DRI).reduce((s,k)=>s+pct(nutrients[k],DRI[k].goal),0)/Object.keys(DRI).length);
  const primary = state.tweaks.primaryColor || '#C8624A';

  return (
    <div style={{ padding:'0 0 100px', overflowY:'auto', height:'100%' }} className="scrollbar-hide">
      {/* Header */}
      <div style={{
        background: `linear-gradient(135deg, ${primary} 0%, #D4803A 100%)`,
        padding:'52px 24px 28px', borderRadius:'0 0 32px 32px',
        position:'relative', overflow:'hidden',
      }}>
        <div style={{ position:'absolute', top:-20, right:-20, width:120, height:120, borderRadius:'50%', background:'rgba(255,255,255,0.08)' }}/>
        <div style={{ position:'absolute', top:30, right:30, width:60, height:60, borderRadius:'50%', background:'rgba(255,255,255,0.06)' }}/>
        <div style={{ position:'relative' }}>
          <p style={{ color:'rgba(255,255,255,0.8)', fontSize:14, fontWeight:600, letterSpacing:0.5 }}>
            {new Date().toLocaleDateString('en-GB',{weekday:'long', day:'numeric', month:'long'})}
          </p>
          <h1 style={{ color:'#fff', fontSize:28, fontWeight:900, marginTop:4 }}>
            Hi, {state.tweaks.babyName||'Amaia'}! 👶
          </h1>
          <p style={{ color:'rgba(255,255,255,0.75)', fontSize:13, marginTop:2 }}>
            {state.tweaks.babyAge||'9 months'} old · Let's track her nutrition
          </p>
          {/* Quick stats */}
          <div style={{ display:'flex', gap:12, marginTop:18 }}>
            <StatPill label="Meals today" value={totalFoods} icon="🍴"/>
            <StatPill label="Formula feeds" value={today.formulaFeeds} icon="🍼"/>
            <StatPill label="Nutrition" value={`${overallPct}%`} icon="💚"/>
          </div>
        </div>
      </div>

      <div style={{ padding:'20px 16px', display:'flex', flexDirection:'column', gap:16 }}>
        {/* Formula feeds */}
        <div style={{ background:'#fff', borderRadius:20, padding:18, boxShadow:'var(--shadow-soft)' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <span style={{ fontSize:20 }}>🍼</span>
              <div>
                <p style={{ fontWeight:800, fontSize:15, color:'var(--text-dark)' }}>Nan Pro Formula</p>
                <p style={{ fontSize:12, color:'var(--text-light)' }}>~150ml per feed</p>
              </div>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <button onClick={()=>dispatch({type:'SET_FORMULA', delta:-1, date:tkey})}
                style={btnStyle('#F5E4C8','#D4933A')}>−</button>
              <span style={{ fontSize:22, fontWeight:900, minWidth:28, textAlign:'center', color:primary }}>
                {today.formulaFeeds}
              </span>
              <button onClick={()=>dispatch({type:'SET_FORMULA', delta:1, date:tkey})}
                style={btnStyle(primary,'#fff')}>+</button>
            </div>
          </div>
          <div style={{ display:'flex', gap:6 }}>
            {[...Array(6)].map((_,i) => (
              <div key={i} style={{
                flex:1, height:6, borderRadius:3,
                background: i < today.formulaFeeds ? primary : '#EDE4D8',
                transition:'background 0.3s',
              }}/>
            ))}
          </div>
        </div>

        {/* Meal slots */}
        <p style={{ fontWeight:800, fontSize:16, color:'var(--text-dark)', paddingLeft:4 }}>Today's Meals</p>
        {MEALS.map(meal => {
          const items = today.meals[meal] || [];
          return (
            <MealSlot key={meal} meal={meal} items={items}
              primary={primary}
              onAdd={()=>dispatch({type:'OPEN_LOG', meal})}
              onRemove={(idx)=>dispatch({type:'REMOVE_FOOD', date:tkey, meal, idx})}
            />
          );
        })}

        {/* Nutrient mini-summary */}
        <div style={{ background:'#fff', borderRadius:20, padding:18, boxShadow:'var(--shadow-soft)' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
            <p style={{ fontWeight:800, fontSize:15 }}>Today's Nutrition</p>
            <button onClick={()=>dispatch({type:'SET_SCREEN', screen:'nutrients'})}
              style={{ fontSize:12, color:primary, fontWeight:700, background:'none', border:'none', cursor:'pointer' }}>
              See all →
            </button>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {['iron','calcium','protein','vitaminD'].map(k => {
              const d = DRI[k];
              const p = pct(nutrients[k], d.goal);
              return (
                <div key={k} style={{ display:'flex', alignItems:'center', gap:10 }}>
                  <span style={{ width:20, fontSize:14 }}>{d.icon}</span>
                  <span style={{ fontSize:12, fontWeight:600, width:68, color:'var(--text-mid)' }}>{d.label}</span>
                  <div style={{ flex:1, height:8, borderRadius:4, background:'#F0EAE2', overflow:'hidden' }}>
                    <div style={{ width:`${p}%`, height:'100%', borderRadius:4, background:d.color, transition:'width 0.8s ease' }}/>
                  </div>
                  <span style={{ fontSize:11, fontWeight:700, color:'var(--text-mid)', width:32, textAlign:'right' }}>{p}%</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Log Modal */}
      {state.logModal && (
        <LogModal
          meal={state.logModal.meal}
          date={tkey}
          selectedFamily={state.selectedFamily}
          primary={primary}
          bgColor={state.tweaks.bgColor || '#FDF8F1'}
          onSelectFamily={name=>dispatch({type:'SET_FAMILY', name})}
          onAdd={(food)=>dispatch({type:'ADD_FOOD', date:tkey, meal:state.logModal.meal, food, by:state.selectedFamily})}
          onClose={()=>dispatch({type:'CLOSE_LOG'})}
          milestones={state.milestonesUnlocked}
        />
      )}
    </div>
  );
}

function StatPill({ label, value, icon }) {
  return (
    <div style={{ background:'rgba(255,255,255,0.2)', borderRadius:12, padding:'8px 12px', flex:1 }}>
      <div style={{ display:'flex', alignItems:'center', gap:4 }}>
        <span style={{ fontSize:14 }}>{icon}</span>
        <span style={{ fontSize:18, fontWeight:900, color:'#fff' }}>{value}</span>
      </div>
      <p style={{ fontSize:10, color:'rgba(255,255,255,0.75)', fontWeight:600, marginTop:1 }}>{label}</p>
    </div>
  );
}

function MealSlot({ meal, items, onAdd, onRemove, primary }) {
  const [open, setOpen] = useState(meal === 'Breakfast' || meal === 'Lunch');
  const hasItems = items.length > 0;
  return (
    <div style={{
      background:'#fff', borderRadius:20, overflow:'hidden',
      boxShadow:'var(--shadow-soft)',
      border: hasItems ? `1.5px solid ${primary}22` : '1.5px solid #F0EAE2',
    }}>
      <button onClick={()=>setOpen(!open)} style={{
        width:'100%', background:'none', border:'none', cursor:'pointer',
        display:'flex', alignItems:'center', gap:12, padding:'14px 16px',

function OverallCircle({ nutrients }) {
  const scores = Object.keys(DRI).map(k => pct(nutrients[k], DRI[k].goal));
  const avg = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
  const r = 36; const circ = 2*Math.PI*r;
  const dash = (avg/100)*circ;
  return (
    <div style={{ position:'relative', width:90, height:90, flexShrink:0 }}>
      <svg width="90" height="90" style={{ transform:'rotate(-90deg)' }}>
        <circle cx="45" cy="45" r={r} fill="none" stroke="#F0EAE2" strokeWidth="8"/>
        <circle cx="45" cy="45" r={r} fill="none" stroke={avg>=80?'#6B8F71':avg>=50?'#D4933A':'#C8624A'} strokeWidth="8"
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"/>
      </svg>
      <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
        <span style={{ fontSize:20, fontWeight:900, color:'var(--text-dark)' }}>{avg}%</span>
        <span style={{ fontSize:9, fontWeight:700, color:'var(--text-light)', marginTop:-2 }}>today</span>
      </div>
    </div>
  );
}

// ─── REDUCER ──────────────────────────────────────────────────────────────────

function reducer(state, action) {
  switch (action.type) {
    case 'SET_SCREEN': return { ...state, screen: action.screen };
    case 'OPEN_LOG': return { ...state, logModal: { meal: action.meal } };
    case 'CLOSE_LOG': return { ...state, logModal: null };
    case 'SET_FAMILY': return { ...state, selectedFamily: action.name };
    case 'SET_TWEAKS': return { ...state, tweaks: { ...state.tweaks, [action.key]: action.value } };
    case 'SET_FORMULA': {
      const cur = state.entries[action.date] || { formulaFeeds:0, meals:{Breakfast:[],Lunch:[],Dinner:[],Snack:[]} };
      const next = Math.max(0, Math.min(8, (cur.formulaFeeds||0) + action.delta));
      return { ...state, entries: { ...state.entries, [action.date]: { ...cur, formulaFeeds:next } } };
    }
    case 'ADD_FOOD': {
      const cur = state.entries[action.date] || { formulaFeeds:0, meals:{Breakfast:[],Lunch:[],Dinner:[],Snack:[]} };
      const mealItems = [...(cur.meals[action.meal]||[]), { food:action.food, by:action.by }];
      const meals = { ...cur.meals, [action.meal]: mealItems };
      const newMilestones = state.milestonesUnlocked.includes(action.food)
        ? state.milestonesUnlocked
        : [...state.milestonesUnlocked, action.food];
      return { ...state, entries: { ...state.entries, [action.date]: { ...cur, meals } }, milestonesUnlocked: newMilestones };
    }
    case 'REMOVE_FOOD': {
      const cur = state.entries[action.date];
      const mealItems = (cur.meals[action.meal]||[]).filter((_,i)=>i!==action.idx);
      const meals = { ...cur.meals, [action.meal]: mealItems };
      return { ...state, entries: { ...state.entries, [action.date]: { ...cur, meals } } };
    }
    case 'TOGGLE_MILESTONE': {
      const has = state.milestonesUnlocked.includes(action.food);
      return { ...state, milestonesUnlocked: has ? state.milestonesUnlocked.filter(f=>f!==action.food) : [...state.milestonesUnlocked, action.food] };
    }
    default: return state;
  }
}

// ─── APP ──────────────────────────────────────────────────────────────────────

const STORAGE_KEY = 'amaia_tracker_v1';

function App() {
  const [state, dispatch] = React.useReducer(reducer, null, () => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) return { ...makeInitialState(), ...JSON.parse(saved) };
    } catch {}
    return makeInitialState();
  });
  const [showTweaks, setShowTweaks] = useState(false);

  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        entries: state.entries,
        milestonesUnlocked: state.milestonesUnlocked,
        screen: state.screen,
        selectedFamily: state.selectedFamily,
        tweaks: state.tweaks,
      }));
    } catch {}
  }, [state.entries, state.milestonesUnlocked, state.screen, state.selectedFamily, state.tweaks]);

  const setScreen = s => dispatch({ type:'SET_SCREEN', screen:s });
  const handleTweakUpdate = (key, value) => dispatch({ type:'SET_TWEAKS', key, value });

  const bg = state.tweaks.bgColor || '#FDF8F1';

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', background:bg, maxWidth:430, margin:'0 auto', position:'relative', overflow:'hidden' }}>
      {state.screen === 'home'       && <HomeScreen state={state} dispatch={dispatch}/>}
      {state.screen === 'nutrients'  && <NutrientsScreen state={state}/>}
      {state.screen === 'week'       && <WeekScreen state={state}/>}
      {state.screen === 'milestones' && <MilestonesScreen state={state} dispatch={dispatch}/>}
      <BottomNav screen={state.screen} setScreen={setScreen} tweaks={state.tweaks}/>
      {/* Tweaks toggle button */}
      <button
        onClick={()=>setShowTweaks(!showTweaks)}
        style={{
          position:'fixed', bottom:72, right:16,
          background: state.tweaks.primaryColor || '#C8624A',
          border:'none', borderRadius:'50%', width:40, height:40,
          cursor:'pointer', zIndex:200, fontSize:18,
          boxShadow:'0 4px 16px rgba(80,50,30,0.2)',
          display:'flex', alignItems:'center', justifyContent:'center',
        }}
        title="Customise"
      >⚙️</button>
      {showTweaks && (
        <TweaksPanel
          tweaks={state.tweaks}
          onUpdate={handleTweakUpdate}
          onClose={()=>setShowTweaks(false)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
