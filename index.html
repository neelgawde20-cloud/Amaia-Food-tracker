/* ── HELPERS ──────────────────────────────────────────── */
function todayKey() { return new Date().toISOString().slice(0,10); }
function r1(n) { return Math.round(n*10)/10; }
function pct(v,g) { return Math.min(100, Math.round((v/g)*100)); }

function calcNutrients(dayData) {
  const t = {iron:0,calcium:0,protein:0,zinc:0,vitaminD:0,vitaminC:0,omega3:0};
  if (!dayData) return t;
  const ff = dayData.formulaFeeds || 0;
  Object.keys(t).forEach(k => t[k] += (FORMULA_PER_FEED[k]||0)*ff);
  Object.values(dayData.meals||{}).forEach(items =>
    (items||[]).forEach(({food}) => { const f=FOODS[food]; if(f) Object.keys(t).forEach(k=>t[k]+=(f[k]||0)); })
  );
  return t;
}

function getCatCounts(dayData) {
  const counts = { Protein:0, Fruits:0, Veggies:0, Grains:0, Dairy:0 };
  if (!dayData) return counts;
  Object.values(dayData.meals||{}).forEach(items =>
    (items||[]).forEach(({food}) => { const f=FOODS[food]; if(f && counts[f.cat]!==undefined) counts[f.cat]++; })
  );
  return counts;
}

function getMealCount(dayData) {
  if (!dayData) return 0;
  return Object.values(dayData.meals||{}).reduce((a,m)=>a+(m||[]).length,0);
}

/* ── INITIAL DATA ─────────────────────────────────────── */

    },
    milestonesUnlocked: ['Rice Cereal','Sweet Potato','Carrot','Peas','Banana','Apple','Avocado','Chicken','Lentils','Egg Yolk','Salmon','Oatmeal','Tofu','Broccoli','Mango'],

/* ── REDUCER ──────────────────────────────────────────── */
function reducer(state, a) {
  switch(a.type) {
    case 'SET_SCREEN': return {...state, screen:a.screen};
    case 'OPEN_LOG':   return {...state, logModal:{meal:a.meal}};
    case 'CLOSE_LOG':  return {...state, logModal:null};
    case 'SET_FAMILY': return {...state, selectedFamily:a.name};
    case 'SET_FORMULA': {
      const cur = state.entries[a.date] || {formulaFeeds:0,meals:{Breakfast:[],Lunch:[],Dinner:[],Snack:[]}};
      return {...state, entries:{...state.entries, [a.date]:{...cur, formulaFeeds:Math.max(0,Math.min(8,(cur.formulaFeeds||0)+a.delta))}}};
    }
    case 'ADD_FOOD': {
      const cur = state.entries[a.date] || {formulaFeeds:0,meals:{Breakfast:[],Lunch:[],Dinner:[],Snack:[]}};
      const meals = {...cur.meals, [a.meal]:[...(cur.meals[a.meal]||[]),{food:a.food,by:a.by}]};
      const newM = state.milestonesUnlocked.includes(a.food) ? state.milestonesUnlocked : [...state.milestonesUnlocked, a.food];
      return {...state, entries:{...state.entries,[a.date]:{...cur,meals}}, milestonesUnlocked:newM};
    }
    case 'REMOVE_FOOD': {
      const cur = state.entries[a.date];
      const meals = {...cur.meals, [a.meal]:(cur.meals[a.meal]||[]).filter((_,i)=>i!==a.idx)};
      return {...state, entries:{...state.entries,[a.date]:{...cur,meals}}};
    }
    case 'TOGGLE_MILESTONE': {
      const has = state.milestonesUnlocked.includes(a.food);
      return {...state, milestonesUnlocked: has ? state.milestonesUnlocked.filter(f=>f!==a.food) : [...state.milestonesUnlocked,a.food]};
    }
    default: return state;
  }
}

  const TC = TWEAK_DEFAULTS.teal;

    <div style={{background:'#fff',borderRadius:18,padding:'14px 16px',marginBottom:12,boxShadow:'0 2px 12px rgba(0,80,75,0.06)'}}>

/* ── NUTRIENTS SCREEN ─────────────────────────────────── */
function NutrientsScreen({ state }) {
  const tkey = todayKey();
  const today = state.entries[tkey];
  const nutrients = calcNutrients(today);
  const TC = TWEAK_DEFAULTS.teal;
  const scores = Object.keys(DRI).map(k=>pct(nutrients[k],DRI[k].goal));
  const avg = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);

  return (
    <div style={{height:'100%',overflowY:'auto',display:'flex',flexDirection:'column'}} className="hide-scroll">
      <div style={{background:`linear-gradient(135deg,${TC} 0%,${TC}AA 100%)`,padding:'52px 24px 28px',borderRadius:'0 0 28px 28px',flexShrink:0}}>
        <p style={{color:'rgba(255,255,255,0.8)',fontSize:13,fontWeight:600}}>Today's</p>
        <h2 style={{color:'#fff',fontSize:26,fontWeight:900}}>Nutrient Tracker</h2>
        <p style={{color:'rgba(255,255,255,0.7)',fontSize:12,marginTop:4}}>WHO guidelines · {TWEAK_DEFAULTS.babyAge}</p>
        <div style={{display:'flex',alignItems:'center',gap:14,marginTop:16,background:'rgba(255,255,255,0.18)',borderRadius:16,padding:'12px 16px'}}>
          <OverallCircle avg={avg} TC={TC}/>
          <div>
            <p style={{color:'#fff',fontWeight:900,fontSize:16}}>Overall Score</p>
            <p style={{color:'rgba(255,255,255,0.8)',fontSize:12,marginTop:2}}>🍼 {(today||{}).formulaFeeds||0} feeds · 🍽 {getMealCount(today)} foods</p>
          </div>
        </div>
      </div>

      <div style={{padding:'16px',display:'flex',flexDirection:'column',gap:12,paddingBottom:100}}>
        {Object.entries(DRI).map(([k,d])=>{
          const val = nutrients[k];
          const p = pct(val,d.goal);
          const status = p>=90?{l:'Great!',bg:'#D6EDDA',c:'#3A8C4A'}: p>=60?{l:'Good',bg:'#FFF4C2',c:'#C4A020'}: {l:'Needs more',bg:'#FCE0E2',c:'#C0404A'};
          return (
            <div key={k} style={{background:'#fff',borderRadius:18,padding:'14px 16px',boxShadow:'0 2px 12px rgba(0,80,75,0.07)'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:20}}>{d.icon}</span>
                  <div>
                    <p style={{fontWeight:800,fontSize:14}}>{d.label}</p>
                    <p style={{fontSize:11,color:'#9BBFBD'}}>{r1(val)} / {d.goal}{d.unit}</p>
                  </div>
                </div>
                <span style={{fontSize:11,fontWeight:700,background:status.bg,color:status.c,padding:'3px 10px',borderRadius:20}}>{status.l}</span>
              </div>
              <div style={{height:9,borderRadius:5,background:'#E6F2F1',overflow:'hidden'}}>
                <div style={{width:`${p}%`,height:'100%',borderRadius:5,background:d.color,transition:'width 1s ease'}}/>
              </div>
              <p style={{fontSize:11,color:'#9BBFBD',marginTop:5,fontWeight:600}}>{p}% of daily goal</p>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function OverallCircle({ avg, TC }) {
  const r=30; const circ=2*Math.PI*r;
  return (
    <div style={{position:'relative',width:74,height:74,flexShrink:0}}>
      <svg width="74" height="74" style={{transform:'rotate(-90deg)'}}>
        <circle cx="37" cy="37" r={r} fill="none" stroke="rgba(255,255,255,0.3)" strokeWidth="7"/>
        <circle cx="37" cy="37" r={r} fill="none" stroke="#fff" strokeWidth="7"
          strokeDasharray={`${(avg/100)*circ} ${circ}`} strokeLinecap="round"/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <span style={{fontSize:17,fontWeight:900,color:'#fff'}}>{avg}%</span>
      </div>
    </div>
  );
}

/* ── WEEK SCREEN ──────────────────────────────────────── */
function WeekScreen({ state, dispatch }) {
  const today = new Date();
  const days = [];
  for(let i=6;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);days.push(d);}
  const tkey = todayKey();
  const TC = TWEAK_DEFAULTS.teal;

  return (
    <div style={{height:'100%',overflowY:'auto',display:'flex',flexDirection:'column'}} className="hide-scroll">
      <div style={{background:`linear-gradient(135deg,#D4933A 0%,#C47B28 100%)`,padding:'52px 24px 24px',borderRadius:'0 0 28px 28px',flexShrink:0}}>
        <p style={{color:'rgba(255,255,255,0.8)',fontSize:13,fontWeight:600}}>This</p>
        <h2 style={{color:'#fff',fontSize:26,fontWeight:900}}>Weekly View</h2>
      </div>

      <div style={{padding:'16px',display:'flex',gap:8}}>
        {days.map(d=>{
          const key=d.toISOString().slice(0,10);
          const dd=state.entries[key];
          const nut=calcNutrients(dd);
          const avg=Math.round(Object.keys(DRI).reduce((s,k)=>s+pct(nut[k],DRI[k].goal),0)/Object.keys(DRI).length);
          const isT=key===tkey;
          return (
            <div key={key} style={{flex:1,background:isT?TC:'#fff',borderRadius:14,padding:'10px 4px',display:'flex',flexDirection:'column',alignItems:'center',gap:5,boxShadow:'0 2px 10px rgba(0,80,75,0.07)'}}>
              <p style={{fontSize:10,fontWeight:700,color:isT?'rgba(255,255,255,0.8)':'#9BBFBD'}}>
                {['M','T','W','T','F','S','S'][d.getDay()===0?6:d.getDay()-1]}
              </p>
              <p style={{fontSize:14,fontWeight:900,color:isT?'#fff':'#1E2D2C'}}>{d.getDate()}</p>
              <div style={{display:'flex',flexDirection:'column',gap:2,width:'85%'}}>
                {['iron','calcium','protein'].map(k=>(
                  <div key={k} style={{height:3,borderRadius:2,background:isT?'rgba(255,255,255,0.25)':'#E6F2F1',overflow:'hidden'}}>
                    <div style={{width:`${Math.min(100,pct(nut[k],DRI[k].goal))}%`,height:'100%',background:isT?'rgba(255,255,255,0.85)':DRI[k].color}}/>
                  </div>
                ))}
              </div>
              <p style={{fontSize:13,fontWeight:900,color:isT?'#fff':'#1E2D2C'}}>{avg}%</p>
              <p style={{fontSize:9,color:isT?'rgba(255,255,255,0.7)':'#9BBFBD',fontWeight:600}}>{getMealCount(dd)}f</p>
            </div>
          );
        })}
      </div>

      <div style={{padding:'0 16px',display:'flex',flexDirection:'column',gap:10,paddingBottom:100}}>
        {[...days].reverse().map(d=>{
          const key=d.toISOString().slice(0,10);
          const dd=state.entries[key];
          if(!dd)return null;
          const nut=calcNutrients(dd);
          const avg=Math.round(Object.keys(DRI).reduce((s,k)=>s+pct(nut[k],DRI[k].goal),0)/Object.keys(DRI).length);
          const isT=key===tkey;
          const allF=Object.values(dd.meals||{}).flat();
          return (
            <div key={key} style={{background:'#fff',borderRadius:16,padding:'14px 16px',boxShadow:'0 2px 10px rgba(0,80,75,0.06)',border:isT?`2px solid ${TC}40`:'2px solid transparent'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <div>
                  <p style={{fontWeight:800,fontSize:14}}>
                    {isT?'Today':d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}
                    {isT&&<span style={{marginLeft:8,fontSize:10,background:`${TC}20`,color:TC,padding:'2px 7px',borderRadius:10,fontWeight:700}}>Today</span>}
                  </p>
                  <p style={{fontSize:12,color:'#9BBFBD',marginTop:1}}>🍼 {dd.formulaFeeds} · 🍽 {getMealCount(dd)} foods</p>
                </div>
                <p style={{fontSize:22,fontWeight:900,color:avg>=75?TC:avg>=50?'#D4933A':'#E8636A'}}>{avg}%</p>
              </div>
              <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                {allF.slice(0,10).map((it,i)=><span key={i} style={{fontSize:18}}>{FOODS[it.food]?.emoji||'🍽'}</span>)}
                {allF.length>10&&<span style={{fontSize:11,color:'#9BBFBD',fontWeight:600,alignSelf:'center'}}>+{allF.length-10}</span>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── MILESTONES SCREEN ────────────────────────────────── */
function MilestonesScreen({ state, dispatch }) {
  const done = state.milestonesUnlocked.length;
  const total = MILESTONES_LIST.length;
  const TC = TWEAK_DEFAULTS.teal;
  return (
    <div style={{height:'100%',overflowY:'auto'}} className="hide-scroll">
      <div style={{background:`linear-gradient(135deg,#8B6B8E 0%,#6B4B6E 100%)`,padding:'52px 24px 24px',borderRadius:'0 0 28px 28px'}}>
        <p style={{color:'rgba(255,255,255,0.8)',fontSize:13,fontWeight:600}}>{TWEAK_DEFAULTS.babyName}'s</p>
        <h2 style={{color:'#fff',fontSize:26,fontWeight:900}}>First Foods 🌟</h2>
        <p style={{color:'rgba(255,255,255,0.7)',fontSize:12,marginTop:2}}>{done} of {total} foods tried</p>
        <div style={{marginTop:12,height:8,borderRadius:4,background:'rgba(255,255,255,0.25)',overflow:'hidden'}}>
          <div style={{width:`${(done/total)*100}%`,height:'100%',background:'rgba(255,255,255,0.85)',borderRadius:4}}/>
        </div>
      </div>
      <div style={{padding:'16px',paddingBottom:100}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
          {MILESTONES_LIST.map(m=>{
            const tried=state.milestonesUnlocked.includes(m.food);
            return (
              <button key={m.food} onClick={()=>dispatch({type:'TOGGLE_MILESTONE',food:m.food})} style={{
                background:tried?'#fff':'#F7FAFA',border:tried?'2px solid #8B6B8E30':'2px solid #E6F2F1',
                borderRadius:16,padding:'14px 6px',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:5,
                opacity:tried?1:0.5,transition:'all 0.2s',boxShadow:tried?'0 3px 14px rgba(139,107,142,0.1)':'none',fontFamily:'Nunito',
              }}>
                <span style={{fontSize:28,filter:tried?'':'grayscale(1)'}}>{m.emoji}</span>
                <span style={{fontSize:10,fontWeight:700,color:'#1E2D2C',textAlign:'center',lineHeight:1.3}}>{m.food}</span>
                <span style={{fontSize:14}}>{tried?'✅':'⬜'}</span>
              </button>
            );
          })}
        </div>
        <p style={{textAlign:'center',fontSize:12,color:'#9BBFBD',marginTop:16,fontWeight:600}}>Tap to toggle tried / not yet</p>
      </div>
    </div>
  );
}

/* ── BOTTOM NAV ───────────────────────────────────────── */

    {id:'nutrients', label:'Nutrients',  icon:(a)=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="14" width="4" height="7" rx="1" fill={a?TC:'#9BBFBD'} opacity={a?1:0.6}/><rect x="10" y="9" width="4" height="12" rx="1" fill={a?TC:'#9BBFBD'} opacity={a?1:0.7}/><rect x="17" y="4" width="4" height="17" rx="1" fill={a?TC:'#9BBFBD'}/></svg>},
    {id:'week',      label:'Week',       icon:(a)=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="3" stroke={a?TC:'#9BBFBD'} strokeWidth="2"/><path d="M3 9h18" stroke={a?TC:'#9BBFBD'} strokeWidth="2"/><path d="M8 2v4M16 2v4" stroke={a?TC:'#9BBFBD'} strokeWidth="2" strokeLinecap="round"/><circle cx="8" cy="14" r="1.5" fill={a?TC:'#9BBFBD'}/><circle cx="12" cy="14" r="1.5" fill={a?TC:'#9BBFBD'}/><circle cx="16" cy="14" r="1.5" fill={a?TC:'#9BBFBD'}/></svg>},
    {id:'milestones',label:'Milestones', icon:(a)=><svg width="22" height="22" viewBox="0 0 24 24" fill={a?TC:'none'} stroke={a?TC:'#9BBFBD'} strokeWidth="2"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>},

        const active=screen===t.id;

/* ── TWEAKS PANEL ─────────────────────────────────────── */
function TweaksPanel({ onClose, profilePhoto, setProfilePhoto }) {
  const fileRef = useRef();
  const [vals, setVals] = useState({...TWEAK_DEFAULTS});
  const update = (k,v) => {
    const next={...vals,[k]:v};
    setVals(next);
    Object.assign(TWEAK_DEFAULTS, next);
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:next},'*');
  };
  const handlePhoto = e => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      setProfilePhoto(ev.target.result);
      update('profilePhoto', ev.target.result);
    };
    reader.readAsDataURL(file);
  };
  const TC = vals.teal;
  return (
    <div style={{position:'fixed',bottom:85,right:12,background:'#fff',borderRadius:20,padding:18,width:230,boxShadow:'0 8px 40px rgba(0,80,75,0.15)',zIndex:300}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <p style={{fontWeight:800,fontSize:15}}>Tweaks</p>
        <button onClick={onClose} style={{background:'#E6F6F5',border:'none',cursor:'pointer',borderRadius:8,width:26,height:26,fontSize:15}}>×</button>
      </div>
      {[['babyName',"Baby's Name"],['babyAge','Age']].map(([k,l])=>(
        <div key={k} style={{marginBottom:10}}>
          <p style={{fontSize:11,fontWeight:700,color:'#9BBFBD',letterSpacing:0.5,marginBottom:5}}>{l.toUpperCase()}</p>
          <input value={vals[k]} onChange={e=>update(k,e.target.value)}
            style={{width:'100%',border:'1.5px solid #D8EDEC',borderRadius:10,padding:'7px 10px',fontSize:13,outline:'none'}}/>
        </div>
      ))}
      <div style={{marginBottom:10}}>
        <p style={{fontSize:11,fontWeight:700,color:'#9BBFBD',letterSpacing:0.5,marginBottom:5}}>ACCENT COLOR</p>
        <input type="color" value={vals.teal} onChange={e=>update('teal',e.target.value)}
          style={{width:'100%',height:34,border:'1.5px solid #D8EDEC',borderRadius:10,cursor:'pointer'}}/>
      </div>
      <div>
        <p style={{fontSize:11,fontWeight:700,color:'#9BBFBD',letterSpacing:0.5,marginBottom:5}}>PROFILE PHOTO</p>
        <button onClick={()=>fileRef.current.click()} style={{
          width:'100%',background:`${TC}15`,border:`1.5px dashed ${TC}60`,borderRadius:10,
          padding:'8px',fontSize:12,fontWeight:700,color:TC,cursor:'pointer',fontFamily:'Nunito',
        }}>📷 Upload photo</button>
        <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handlePhoto}/>
      </div>
    </div>
  );
}

/* ── APP ──────────────────────────────────────────────── */
const STORAGE_KEY = 'amaia_v2';

function App() {
  const [state, dispatch] = useReducer(reducer, null, () => {
    try { const s=localStorage.getItem(STORAGE_KEY); if(s) return {...makeInitialState(),...JSON.parse(s)}; } catch {}
    return makeInitialState();
  });
  const [showTweaks, setShowTweaks] = useState(false);
  const [profilePhoto, setProfilePhoto] = useState(TWEAK_DEFAULTS.profilePhoto||'');

  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({entries:state.entries,milestonesUnlocked:state.milestonesUnlocked,screen:state.screen,selectedFamily:state.selectedFamily})); } catch {}
  }, [state.entries, state.milestonesUnlocked, state.screen, state.selectedFamily]);

  useEffect(() => {
    const h = e => {
      if (e.data?.type==='__activate_edit_mode')   setShowTweaks(true);
      if (e.data?.type==='__deactivate_edit_mode')  setShowTweaks(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return () => window.removeEventListener('message', h);
  }, []);

  const setScreen = s => dispatch({type:'SET_SCREEN',screen:s});

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:'#F7FAFA',maxWidth:430,margin:'0 auto',position:'relative',overflow:'hidden'}}>
      {state.screen==='home'        && <HomeScreen state={state} dispatch={dispatch} profilePhoto={profilePhoto}/>}
      {state.screen==='nutrients'   && <NutrientsScreen state={state}/>}
      {state.screen==='week'        && <WeekScreen state={state} dispatch={dispatch}/>}
      {state.screen==='milestones'  && <MilestonesScreen state={state} dispatch={dispatch}/>}
      <BottomNav screen={state.screen} setScreen={setScreen}/>
      {showTweaks && <TweaksPanel onClose={()=>setShowTweaks(false)} profilePhoto={profilePhoto} setProfilePhoto={setProfilePhoto}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
